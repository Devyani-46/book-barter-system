<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Book Barter</title>
  <link rel="stylesheet" href="dashboard.css">

  <style>
    .book-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .book-card {
      background: #fff;
      padding: 12px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .book-img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 6px;
    }

    button {
      margin-top: 8px;
      padding: 6px 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<aside class="sidebar">
  <img src="logo image.jpg" alt="Book Barter Logo" class="logo-img" style="width:40px;">
  <span>Book Barter</span>

  <nav>
    <ul>
      <li><a href="dashboard.html" class="active">Dashboard</a></li>
      <li><a href="mybook.html">My Books</a></li>
      <li><a href="transactions.html">Records</a></li>
      <li><a href="message.html">Chat</a></li>
      <li><a href="profile.html">Profile</a></li>
      <li id="logoutBtn">Logout</li>
    </ul>
  </nav>
</aside>

<main class="main-content">
  <header class="topbar">
    <h2 id="welcomeMessage">Welcome!</h2>
  </header>

  <div class="book-list" id="bookList"></div>
</main>

<script>
/* ================= AUTH CHECK ================= */
const user = JSON.parse(localStorage.getItem("loggedInUser"));
if (!user) {
  window.location.href = "login.html";
}

document.getElementById("welcomeMessage").innerText =
  `Welcome, ${user.name} 👋`;

document.getElementById("logoutBtn").onclick = () => {
  localStorage.removeItem("loggedInUser");
  window.location.href = "login.html";
};

/* ================= LOAD BOOKS ================= */
const bookList = document.getElementById("bookList");

async function loadBooks() {
  try {
    const res = await fetch(`http://localhost:3000/all-books/${user._id}`);
    const books = await res.json();

    bookList.innerHTML = "";

    books.forEach(book => {
      const div = document.createElement("div");
      div.className = "book-card";
      div.innerHTML = `
        <img src="${book.coverImage || 'https://via.placeholder.com/200'}" class="book-img">
        <h4>${book.title}</h4>
        <p>${book.author}</p>
        <button onclick="requestBook('${book.userId}','${book._id}')">
          📩 Request Book
        </button>
      `;
      bookList.appendChild(div);
    });
  } catch (err) {
    console.error(err);
    alert("Failed to load books");
  }
}

/* ================= REQUEST BOOK (FIXED) ================= */
async function requestBook(toUserId, bookId) {
  try {
    const res = await fetch("http://localhost:3000/chat-request", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        fromUser: user._id,
        toUser: toUserId,
        bookId: bookId
      })
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data.message || "Request already sent");
      return;
    }

    alert("✅ Book request sent successfully!");
  } catch (error) {
    console.error(error);
    alert("❌ Error sending request");
  }
}

loadBooks();
</script>

</body>
</html>
